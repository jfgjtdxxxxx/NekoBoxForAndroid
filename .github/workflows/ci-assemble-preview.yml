name: CI - Assemble Preview Debug

on:
  push:
    branches: [ feature/auto-import-vless ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Assemble Preview Debug
        run: ./gradlew :app:assemblePreviewDebug --stacktrace --info

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-debug-apks
          path: app/build/outputs/**/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            **/build/reports/**
            **/build/*.log
            app/build/**/outputs
