name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Build APK
        run: ./gradlew assemblePreviewDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NekoBox-Preview.apk
          path: app/build/outputs/apk/preview/debug/*.apk