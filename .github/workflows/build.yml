name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build Debug APK (Play Flavor)
        run: ./gradlew assemblePlayDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NekoBox-Play.apk
          path: app/build/outputs/apk/play/debug/app-play-debug.apk